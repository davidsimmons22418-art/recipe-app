<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Mise en Place">
<title>Mise en Place</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Mono:wght@300;400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --cream: #faf7f0;
  --warm: #f2ebe0;
  --ink: #1a1410;
  --brown: #5c3d2e;
  --rust: #c4501a;
  --sage: #7a8c6e;
  --gold: #d4a843;
  --light: #b8956a;
  --card: #fff9f0;
  --border: #e8ddd0;
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

html { font-size: 16px; }

body {
  background: var(--cream);
  color: var(--ink);
  font-family: 'DM Sans', sans-serif;
  font-weight: 300;
  min-height: 100vh;
  padding-bottom: env(safe-area-inset-bottom, 20px);
}

/* HEADER */
.header {
  background: var(--cream);
  padding: 56px 20px 16px;
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 10;
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
}

.logo {
  font-family: 'Playfair Display', serif;
  font-size: 1.7rem;
  font-weight: 700;
  letter-spacing: -0.02em;
}
.logo em { color: var(--rust); font-style: italic; }

.tagline {
  font-family: 'DM Mono', monospace;
  font-size: 0.6rem;
  color: var(--light);
  letter-spacing: 0.15em;
  text-transform: uppercase;
  margin-top: 2px;
}

/* MAIN */
.main { padding: 20px 16px; max-width: 500px; margin: 0 auto; }

/* CARD */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 20px;
  box-shadow: 0 2px 16px rgba(92,61,46,0.06);
}

/* TABS */
.tabs {
  display: flex;
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
  margin-bottom: 16px;
}

.tab {
  flex: 1;
  padding: 10px;
  background: transparent;
  border: none;
  cursor: pointer;
  font-family: 'DM Mono', monospace;
  font-size: 0.68rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--light);
  transition: all 0.2s;
}
.tab.active { background: var(--ink); color: var(--cream); }

/* TEXTAREA */
textarea {
  width: 100%;
  min-height: 100px;
  background: var(--warm);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px;
  font-family: 'DM Sans', sans-serif;
  font-size: 1rem;
  font-weight: 300;
  color: var(--ink);
  resize: none;
  outline: none;
  line-height: 1.6;
  -webkit-appearance: none;
  appearance: none;
}
textarea:focus { border-color: var(--rust); }
textarea::placeholder { color: #b8a898; font-style: italic; }

/* DIETS */
.diet-label {
  font-family: 'DM Mono', monospace;
  font-size: 0.6rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--light);
  margin: 14px 0 8px;
}

.chips {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}

.chip {
  padding: 7px 14px;
  border: 1px solid var(--border);
  border-radius: 999px;
  background: transparent;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.82rem;
  color: var(--brown);
  cursor: pointer;
  transition: all 0.2s;
  -webkit-appearance: none;
}
.chip.active { background: var(--sage); border-color: var(--sage); color: white; }

/* SERVINGS */
.bottom-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 16px;
  gap: 12px;
}

.servings {
  display: flex;
  align-items: center;
  gap: 10px;
}

.srv-label {
  font-family: 'DM Mono', monospace;
  font-size: 0.6rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--light);
}

.qty-btn {
  width: 34px;
  height: 34px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--warm);
  cursor: pointer;
  font-size: 1.2rem;
  color: var(--brown);
  display: flex;
  align-items: center;
  justify-content: center;
  line-height: 1;
  -webkit-appearance: none;
}

.qty-num {
  font-family: 'Playfair Display', serif;
  font-size: 1.3rem;
  min-width: 26px;
  text-align: center;
}

/* GENERATE BUTTON */
.gen-btn {
  flex: 1;
  padding: 13px 16px;
  background: var(--rust);
  color: white;
  border: none;
  border-radius: 10px;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.95rem;
  font-weight: 500;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  transition: all 0.2s;
  -webkit-appearance: none;
}
.gen-btn:disabled { opacity: 0.6; }

.spinner {
  width: 15px; height: 15px;
  border: 2px solid rgba(255,255,255,0.35);
  border-top-color: white;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  display: none;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ERROR */
.error {
  margin-top: 16px;
  padding: 14px;
  background: #fff0ec;
  border: 1px solid #f5c4b4;
  border-radius: 10px;
  color: var(--rust);
  font-size: 0.88rem;
  text-align: center;
}

/* RECIPE CARD */
.recipe-card {
  margin-top: 20px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 4px 24px rgba(92,61,46,0.08);
  animation: fadeUp 0.4s ease;
}
@keyframes fadeUp { from { opacity:0; transform: translateY(16px); } to { opacity:1; transform:none; } }

.recipe-head {
  background: var(--ink);
  color: var(--cream);
  padding: 22px 20px 18px;
}

.recipe-name {
  font-family: 'Playfair Display', serif;
  font-size: 1.6rem;
  font-weight: 700;
  line-height: 1.2;
}

.recipe-tagline {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-size: 0.9rem;
  color: var(--gold);
  margin-top: 6px;
}

.recipe-meta {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-top: 14px;
}

.meta-k {
  font-family: 'DM Mono', monospace;
  font-size: 0.56rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: rgba(250,247,240,0.4);
  margin-bottom: 2px;
}
.meta-v { font-size: 0.88rem; }

/* SECTION */
.section { padding: 20px 20px 0; }
.section:last-child { padding-bottom: 20px; }

.sec-title {
  font-family: 'DM Mono', monospace;
  font-size: 0.6rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--rust);
  margin-bottom: 12px;
}

/* INGREDIENTS */
.ing-list { list-style: none; display: flex; flex-direction: column; gap: 8px; }
.ing-list li {
  font-size: 0.9rem;
  line-height: 1.5;
  color: var(--brown);
  padding-left: 16px;
  position: relative;
}
.ing-list li::before {
  content: '—';
  position: absolute; left: 0;
  color: var(--gold); font-size: 0.7rem; top: 2px;
}

/* STEPS */
.steps { display: flex; flex-direction: column; gap: 14px; }

.step { display: flex; gap: 12px; }

.step-num {
  font-family: 'Playfair Display', serif;
  font-size: 1.4rem;
  color: var(--border);
  min-width: 26px;
  line-height: 1.2;
  font-weight: 700;
}

.step-text {
  font-size: 0.88rem;
  line-height: 1.7;
  color: #3a2e28;
  padding-top: 2px;
}

/* ACTION BUTTONS */
.action-row {
  display: flex;
  gap: 8px;
  padding: 16px 20px 20px;
}

.cook-btn-main {
  flex: 1;
  padding: 12px;
  background: transparent;
  border: 1px dashed var(--gold);
  border-radius: 10px;
  font-family: 'DM Mono', monospace;
  font-size: 0.65rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--gold);
  cursor: pointer;
  -webkit-appearance: none;
}

.save-btn {
  padding: 12px 16px;
  background: transparent;
  border: 1px solid var(--sage);
  border-radius: 10px;
  font-family: 'DM Mono', monospace;
  font-size: 0.65rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--sage);
  cursor: pointer;
  white-space: nowrap;
  -webkit-appearance: none;
  transition: all 0.2s;
}
.save-btn.saved { background: var(--sage); color: white; }

/* COOKING MODE */
.cook-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: var(--ink);
  z-index: 100;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 24px;
  padding-top: max(60px, env(safe-area-inset-top, 40px));
  padding-bottom: max(40px, env(safe-area-inset-bottom, 40px));
}
.cook-overlay.show { display: flex; animation: fadeIn 0.3s ease; }
@keyframes fadeIn { from { opacity:0; } to { opacity:1; } }

.cook-close {
  position: absolute;
  top: max(52px, env(safe-area-inset-top, 52px));
  right: 20px;
  background: none;
  border: 1px solid rgba(250,247,240,0.2);
  color: var(--cream);
  padding: 8px 14px;
  border-radius: 8px;
  cursor: pointer;
  font-family: 'DM Mono', monospace;
  font-size: 0.62rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  -webkit-appearance: none;
}

.cook-progress {
  font-family: 'DM Mono', monospace;
  font-size: 0.62rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 24px;
}

.cook-title {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-size: 0.95rem;
  color: var(--light);
  margin-bottom: 12px;
  text-align: center;
}

.cook-text {
  font-size: 1.2rem;
  color: var(--cream);
  text-align: center;
  line-height: 1.7;
  font-weight: 300;
  max-width: 340px;
}

.cook-nav {
  display: flex;
  gap: 12px;
  margin-top: 36px;
  width: 100%;
  max-width: 340px;
}

.cook-nav button {
  flex: 1;
  padding: 14px;
  border-radius: 10px;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.95rem;
  cursor: pointer;
  border: 1px solid rgba(250,247,240,0.2);
  background: transparent;
  color: var(--cream);
  -webkit-appearance: none;
}
.cook-nav button.primary { background: var(--rust); border-color: var(--rust); font-weight: 500; }
.cook-nav button:disabled { opacity: 0.3; }

/* SAVED */
.saved-section { margin-top: 28px; }
.saved-head {
  font-family: 'Playfair Display', serif;
  font-size: 1.1rem;
  font-style: italic;
  margin-bottom: 12px;
}

.saved-grid { display: flex; flex-direction: column; gap: 10px; }

.saved-item {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px 16px;
  cursor: pointer;
  display: flex;
  justify-content: space-between;
  align-items: center;
  transition: border-color 0.2s;
  -webkit-tap-highlight-color: rgba(196,80,26,0.1);
}
.saved-item:active { border-color: var(--rust); }

.saved-name {
  font-family: 'Playfair Display', serif;
  font-size: 0.95rem;
  font-weight: 700;
  line-height: 1.3;
}
.saved-meta {
  font-family: 'DM Mono', monospace;
  font-size: 0.58rem;
  color: var(--light);
  letter-spacing: 0.07em;
  margin-top: 3px;
}
.saved-arrow { color: var(--border); font-size: 1rem; margin-left: 8px; }
</style>
</head>
<body>

<div class="header">
  <div class="logo">Mise <em>en Place</em></div>
  <div class="tagline">AI Recipe Builder</div>
</div>

<div class="main">
  <!-- Input Card -->
  <div class="card">
    <div class="tabs">
      <button class="tab active" data-mode="description">Description</button>
      <button class="tab" data-mode="ingredients">Ingredients</button>
    </div>

    <textarea id="user-input" rows="4"
      placeholder="Describe what you're craving… e.g. 'a cozy Italian dinner with mushrooms'"></textarea>

    <div class="diet-label">Dietary filters</div>
    <div class="chips">
      <button class="chip" data-diet="vegan">Vegan</button>
      <button class="chip" data-diet="vegetarian">Vegetarian</button>
      <button class="chip" data-diet="gluten-free">Gluten-Free</button>
      <button class="chip" data-diet="dairy-free">Dairy-Free</button>
      <button class="chip" data-diet="keto">Keto</button>
    </div>

    <div class="bottom-row">
      <div class="servings">
        <span class="srv-label">Serves</span>
        <button class="qty-btn" id="dec">−</button>
        <span class="qty-num" id="qty">2</span>
        <button class="qty-btn" id="inc">+</button>
      </div>
      <button class="gen-btn" id="gen-btn">
        <div class="spinner" id="spinner"></div>
        <span id="btn-text">Generate ✦</span>
      </button>
    </div>
  </div>

  <!-- Error -->
  <div class="error" id="error" style="display:none;"></div>

  <!-- Recipe output -->
  <div id="output"></div>

  <!-- Saved -->
  <div class="saved-section" id="saved-section" style="display:none;">
    <div class="saved-head">Saved Recipes</div>
    <div class="saved-grid" id="saved-grid"></div>
  </div>
</div>

<!-- Cooking Mode -->
<div class="cook-overlay" id="cook-overlay">
  <button class="cook-close" id="cook-close">✕ Exit</button>
  <div class="cook-progress" id="cook-prog"></div>
  <div class="cook-title" id="cook-title"></div>
  <div class="cook-text" id="cook-text"></div>
  <div class="cook-nav">
    <button id="cook-prev" disabled>← Prev</button>
    <button id="cook-next" class="primary">Next →</button>
  </div>
</div>

<script>
let servings = 2;
let mode = 'description';
let diets = new Set();
let recipe = null;
let cookIdx = 0;
let saved = [];

// Load saved
try { saved = JSON.parse(localStorage.getItem('mise_saved') || '[]'); } catch {}
renderSaved();

// Servings
document.getElementById('dec').onclick = () => { if (servings > 1) { servings--; document.getElementById('qty').textContent = servings; } };
document.getElementById('inc').onclick = () => { if (servings < 20) { servings++; document.getElementById('qty').textContent = servings; } };

// Tabs
document.querySelectorAll('.tab').forEach(t => {
  t.onclick = () => {
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    mode = t.dataset.mode;
    document.getElementById('user-input').placeholder = mode === 'description'
      ? "Describe what you're craving… e.g. 'a cozy Italian dinner with mushrooms'"
      : "List your ingredients… e.g. chicken thighs, lemon, garlic, white wine";
  };
});

// Diet chips
document.querySelectorAll('.chip').forEach(c => {
  c.onclick = () => {
    c.classList.toggle('active');
    diets.has(c.dataset.diet) ? diets.delete(c.dataset.diet) : diets.add(c.dataset.diet);
  };
});

// Generate
document.getElementById('gen-btn').onclick = generate;

async function generate() {
  const input = document.getElementById('user-input').value.trim();
  if (!input) { document.getElementById('user-input').focus(); return; }

  const btn = document.getElementById('gen-btn');
  const spinner = document.getElementById('spinner');
  const btnText = document.getElementById('btn-text');
  btn.disabled = true;
  spinner.style.display = 'block';
  btnText.textContent = 'Cooking…';
  document.getElementById('error').style.display = 'none';
  document.getElementById('output').innerHTML = '';

  const dietText = diets.size ? `Dietary requirements: ${[...diets].join(', ')}.` : '';
  const modeText = mode === 'ingredients'
    ? `The user has these ingredients: ${input}. Create a recipe using primarily these.`
    : `The user wants: ${input}.`;

  const prompt = `You are a world-class chef. ${modeText} ${dietText} Serves ${servings}.

Respond ONLY with valid JSON, no markdown, no explanation:
{
  "name": "Recipe Name",
  "tagline": "short poetic description",
  "time": "45 mins",
  "difficulty": "Easy",
  "cuisine": "Italian",
  "ingredients": ["amount + ingredient"],
  "steps": [{"title": "short title", "text": "full instruction"}]
}
Include 6-10 steps. Be creative and specific.`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': 'placeholder',
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1500,
        messages: [{ role: 'user', content: prompt }]
      })
    });

    const data = await res.json();
    if (data.error) throw new Error(data.error.message);
    const text = (data.content || []).map(i => i.text || '').join('');
    const clean = text.replace(/```json|```/g, '').trim();
    recipe = JSON.parse(clean);
    recipe.servings = servings;
    renderRecipe(recipe);
  } catch (e) {
    const err = document.getElementById('error');
    err.textContent = 'Couldn\'t generate recipe — check your connection and try again.';
    err.style.display = 'block';
  }

  btn.disabled = false;
  spinner.style.display = 'none';
  btnText.textContent = 'Generate ✦';
}

function renderRecipe(r) {
  document.getElementById('output').innerHTML = `
    <div class="recipe-card">
      <div class="recipe-head">
        <div class="recipe-name">${esc(r.name)}</div>
        <div class="recipe-tagline">${esc(r.tagline)}</div>
        <div class="recipe-meta">
          <div><div class="meta-k">Time</div><div class="meta-v">${esc(r.time)}</div></div>
          <div><div class="meta-k">Serves</div><div class="meta-v">${r.servings}</div></div>
          <div><div class="meta-k">Difficulty</div><div class="meta-v">${esc(r.difficulty)}</div></div>
          <div><div class="meta-k">Cuisine</div><div class="meta-v">${esc(r.cuisine)}</div></div>
        </div>
      </div>

      <div class="section">
        <div class="sec-title">Ingredients</div>
        <ul class="ing-list">
          ${r.ingredients.map(i => `<li>${esc(i)}</li>`).join('')}
        </ul>
      </div>

      <div class="section" style="padding-bottom:20px;">
        <div class="sec-title">Method</div>
        <div class="steps">
          ${r.steps.map((s, i) => `
            <div class="step">
              <div class="step-num">${String(i+1).padStart(2,'0')}</div>
              <div class="step-text"><strong style="font-weight:500">${esc(s.title)}.</strong> ${esc(s.text)}</div>
            </div>
          `).join('')}
        </div>
      </div>

      <div class="action-row">
        <button class="cook-btn-main" id="start-cook">⚑ Cooking Mode</button>
        <button class="save-btn" id="save-btn">★ Save</button>
      </div>
    </div>
  `;

  document.getElementById('start-cook').onclick = () => { cookIdx = 0; showCookStep(); document.getElementById('cook-overlay').classList.add('show'); };
  document.getElementById('save-btn').onclick = saveRecipe;
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Cooking mode
function showCookStep() {
  const steps = recipe.steps;
  document.getElementById('cook-prog').textContent = `Step ${cookIdx+1} of ${steps.length}`;
  document.getElementById('cook-title').textContent = steps[cookIdx].title;
  document.getElementById('cook-text').textContent = steps[cookIdx].text;
  document.getElementById('cook-prev').disabled = cookIdx === 0;
  document.getElementById('cook-next').textContent = cookIdx === steps.length - 1 ? '✓ Done' : 'Next →';
}

document.getElementById('cook-next').onclick = () => {
  if (cookIdx < recipe.steps.length - 1) { cookIdx++; showCookStep(); }
  else { document.getElementById('cook-overlay').classList.remove('show'); }
};
document.getElementById('cook-prev').onclick = () => { if (cookIdx > 0) { cookIdx--; showCookStep(); } };
document.getElementById('cook-close').onclick = () => document.getElementById('cook-overlay').classList.remove('show');

// Save
function saveRecipe() {
  if (!recipe) return;
  saved = [recipe, ...saved].slice(0, 20);
  try { localStorage.setItem('mise_saved', JSON.stringify(saved)); } catch {}
  const btn = document.getElementById('save-btn');
  btn.textContent = '✓ Saved';
  btn.classList.add('saved');
  setTimeout(() => { btn.textContent = '★ Save'; btn.classList.remove('saved'); }, 1500);
  renderSaved();
}

function renderSaved() {
  if (!saved.length) { document.getElementById('saved-section').style.display = 'none'; return; }
  document.getElementById('saved-section').style.display = 'block';
  document.getElementById('saved-grid').innerHTML = saved.map((r, i) => `
    <div class="saved-item" data-i="${i}">
      <div>
        <div class="saved-name">${esc(r.name)}</div>
        <div class="saved-meta">${esc(r.cuisine)} · ${esc(r.time)} · ${r.servings} servings</div>
      </div>
      <div class="saved-arrow">›</div>
    </div>
  `).join('');
  document.querySelectorAll('.saved-item').forEach(el => {
    el.onclick = () => {
      recipe = saved[el.dataset.i];
      servings = recipe.servings;
      document.getElementById('qty').textContent = servings;
      renderRecipe(recipe);
      window.scrollTo({ top: 0, behavior: 'smooth' });
    };
  });
}
</script>
</body>
</html>
